apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
# these labels are replicaset labels
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  replicas: 1
  selector:
   # using these labels replica set selects the pod
    matchLabels:
      project: roboshop
      tier: db
    component: mongodb
  # This is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mongodb
    spec:
      containers:
      - name: mongodb
        image: mskumarmadhavarapu/mongodb:1.0.0